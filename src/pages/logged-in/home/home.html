<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>Home Page</ion-title>
  </ion-navbar>
</ion-header> 

<ion-content padding>
  <ion-card *ngIf="statistics && statistics.candidate">
    <ion-card-header>
      Statistics
    </ion-card-header>
    <ion-list>
        <button ion-item>
          Current Company : {{statistics.candidate.company_name}}
        </button>
        <button ion-item>
          Current Store : {{statistics.candidate.store_name}}
        </button>
        <button ion-item>
          Current Hourly Rate : KM {{statistics.candidate.candidate_hourly_rate}}
        </button>
        <button ion-item>
          Total Hours Spent :  {{statistics.total_hours}}
        </button>
        <button ion-item>
          Earning : KM {{statistics.total_paid}}
        </button>
        <button ion-item>
          Bonus : KM {{statistics.total_bonus}}
        </button>
        <button ion-item>
          Total Earning : KM {{statistics.total_earning}}
        </button>
    </ion-list>
  </ion-card>
</ion-content>
