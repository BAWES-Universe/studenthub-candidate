<!-- Menu Left -->
<ion-menu #menuLeft side="left" type="overlay" [content]="loggedInContent">
  <ion-header>
    <ion-toolbar text-center style="height:auto;">
      <img margin class='logo' src="assets/logo.png" />
      <h3>Payroll Candidate</h3>
    </ion-toolbar>
  </ion-header>
  <ion-content>

    <ion-list>
      <ion-list-header>Personal</ion-list-header>

      <button ion-item (click)="loadPage('summary')">
        <ion-icon name="stats" item-left></ion-icon>
        Summary
      </button>
      
      <button ion-item (click)="loadPage('salary')">
        <ion-icon name="globe" item-left></ion-icon>
        Salary Transfers
      </button>

      <button ion-item (click)="loadPage('employer')">
        <ion-icon name="cube" item-left></ion-icon>
        Employer
      </button>

      <button ion-item (click)="logout()">
        <ion-icon name="ios-log-out" item-left></ion-icon>
        Logout
      </button>

    </ion-list>

  </ion-content>
</ion-menu>

<ion-nav #loggedInContent swipeBackEnabled="true" [root]="rootPage"></ion-nav>
