<ion-header >
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>
    <ion-title>Change Password</ion-title>
  </ion-navbar>
</ion-header>

<ion-content>
  <form [formGroup]="passwordForm">
    <ion-list>
        <ion-item>
          <ion-label floating>Old Password</ion-label>
          <ion-input type="text" formControlName="oldPassword" ></ion-input>
        </ion-item>
        <ion-item>
          <ion-label floating>New Password</ion-label>
          <ion-input type="text" formControlName="newPassword"></ion-input>
        </ion-item>
    </ion-list>


  <div padding>
    <button ion-button (click)="save() " color="primary" block>Submit</button>
  </div>


  </form>
</ion-content>
