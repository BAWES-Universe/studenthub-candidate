<ion-header>
  <ion-navbar>
    <ion-title>Home Page</ion-title>
    <ion-buttons end>
     <a ion-button icon-only (click)="openPopover($event)">
      <ion-icon name="more"></ion-icon>
    </a>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content >


  <ion-item>
    <ion-avatar item-left *ngIf="statistics">
      <img src="https://sh-payroll.s3.eu-west-2.amazonaws.com/{{statistics.candidate.candidate_personal_photo}}">
    </ion-avatar>
        <ion-grid>
            <ion-row>
                <ion-col  col-9>
                  <h2 *ngIf="statistics">{{statistics.candidate.candidate_name}}</h2>
                </ion-col>
                <ion-col col-3 pull-0.5>
                  <b>1.2 KWD</b>
                </ion-col>
            </ion-row>
        </ion-grid>

    <p  *ngIf="salaries">  {{ salaries[0].company_name }}</p>
  </ion-item>

  <ion-refresher (ionRefresh)="doRefresh($event)">
    <ion-refresher-content
      pullingIcon="arrow-dropdown"
      pullingText="Pull to refresh"
      refreshingSpinner="circles"
      refreshingText="Refreshing...">
    </ion-refresher-content>
  </ion-refresher>


 <ion-item-group>
  <ion-item-divider color="light">Transactions</ion-item-divider>
    <ion-item *ngFor="let salary of salaries">
        <ion-grid>
            <ion-row>
                <ion-col  col-9>
                  {{ salary.tc_created_at }}
                </ion-col>
                <ion-col col-3 pull-0.5 *ngIf="salary.bonus">
                  <span class="total"><b>KWD{{salary.total }}</b></span>
                </ion-col>
            </ion-row>
            <ion-row>
              <ion-col  col-9>
                  Bonus:<span class="total"><b>KWD {{salary.bonus }}</b></span>
              </ion-col>
              <ion-col>
                 <ion-badge>{{salary.status}}</ion-badge>
              </ion-col>
            </ion-row>
        </ion-grid>
    </ion-item>
  </ion-item-group>
  <ion-row text-center>
    <div class="pagination-wrapper">
      <button *ngFor="let page of pages" ion-button small color="{{ pageLinkColor(page) }}" (click)="loadData(page)">
        {{ page }}
      </button>
    </div>
  </ion-row>
  <ion-item *ngIf="!salaries">
      No Result(s)
  </ion-item>
