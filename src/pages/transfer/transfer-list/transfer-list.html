<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>Transfer List</ion-title>
  </ion-navbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item-sliding *ngFor="let transferMember of transfer ">
      <button ion-item>
        Company Name:{{ transferMember.company_name}}<br>
        Company Email: {{ transferMember.company_email}}<br>
        Hours: {{ transferMember.hours}}  <br>   
        Bonus: {{ transferMember.bonus}}  <br>   
        Total: {{ transferMember.total}}  <br>   
      </button>

    </ion-item-sliding>
  </ion-list>
</ion-content>
