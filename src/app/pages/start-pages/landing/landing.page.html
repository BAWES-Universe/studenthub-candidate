<ion-content>
  <div class="max-width">
    <a class="translate-link">English</a>
    <div class="logo">
      <img src="assets/logo.svg">
    </div>
    <h3>Part-time jobs for students and fresh graduates</h3>

    <ion-button class="start-btn" expand="block" (click)="loginPage()" color="dark">Get Started</ion-button>

    <div class="footer">
      <div class="float-logo">
        <img src="assets/floatDoodle.svg">
      </div>
      <ion-card class="visit-site" tappable (click)="visitWebsite()">
        <strong>Learn more about StudentHub</strong>
        <span>Visit our website</span>
      </ion-card>
    </div>
  </div>
</ion-content>
