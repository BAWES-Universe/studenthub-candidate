<ion-content [attr.dir]="translateService.direction()" class="ion-padding">
  <div class="no-internet-msg">

    <h2>{{ "Unable to connect to the Payroll Servers" | translate }}</h2>

    <h3>{{ "Please check your internet connection then attempt to reconnect." | translate }}</h3>

    <br />

    <ion-button color="dark" class="btn-refresh" (click)="refresh()">
      {{ "Attempt to Reconnect" | translate }}
    </ion-button>
  </div>
</ion-content>
