<ion-content [attr.dir]="translateService.direction()">
  <div class="max-width">
    <ion-button fill="clear" (click)="back()" class="btn-close">
      <img src="assets/images/ic_cancel.svg" />
    </ion-button>

    <h3>{{ "Type your password to sign in" | translate }}</h3>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="classicInput" novalidate>

      <ion-input type="password" enterkeyhint='{{ "Sign in" | translate }}' #passwordInput formControlName="password" placeholder="{{ 'Your password' | translate }}"></ion-input>

      <ion-button class="btn-signup" [disabled]="!loginForm.valid || isLoading || resettingPassword" type="submit">
        <ion-spinner *ngIf="isLoading"></ion-spinner>
        <span *ngIf="!isLoading">{{ "Sign in" | translate }}</span>
      </ion-button>
      <div class="ion-text-center" *ngIf="!isLoading">
          <a (click)="resetPasswordRequest()" tappable>

            <ion-spinner *ngIf="resettingPassword"></ion-spinner>
            <span *ngIf="!resettingPassword">{{"Reset Password" | translate}}</span>
          </a>
      </div>
    </form>
  </div>
</ion-content>
