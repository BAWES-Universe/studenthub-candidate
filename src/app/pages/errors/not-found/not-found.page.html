<ion-content [attr.dir]="translateService.direction()" class="ion-padding">
    
  <div class='brand'>
    <img src="assets/logo.png" />
  </div>
   
  <div class="error-msg">
      
    <h2>{{ "Page not found" | translate }}</h2>

    <p>{{ "The page you are looking for does not exist." | translate }}</p>

    <br />

    <ion-button (click)="dashboard()" class="btn-dashboard">
      {{ "Dashboard" | translate }}
    </ion-button>
  </div>
</ion-content>
