<ion-header>
  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-back-button defaultHref="dashboard"></ion-back-button>
    </ion-buttons>

    <ion-title>Change Password</ion-title>

  </ion-toolbar>
</ion-header>

<ion-content>
  <form [formGroup]="passwordForm">
    <ion-list>
        <ion-item>
          <ion-label position="floating">Old Password</ion-label>
          <ion-input type="password" formControlName="oldPassword"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="floating">New Password</ion-label>
          <ion-input type="password" formControlName="newPassword"></ion-input>
        </ion-item>

        <ion-item lines="none">
          <ion-button [disabled]="isLoading || !passwordForm || !passwordForm.valid" (click)="save()">
            <span *ngIf="!isLoading">Save</span>
            <ion-spinner *ngIf="isLoading"></ion-spinner>
          </ion-button>
        </ion-item>
        
    </ion-list>
  </form>
</ion-content>
