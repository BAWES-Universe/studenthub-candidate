<ion-header mode="md" *ngIf="!platform.is('mobile')" class="browser-tab clear-header" [class.add-border]="showHeader">
  <ion-toolbar class="main-toolbar">
    <div class="brand">
      <img src="assets/logo.svg">
    </div>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-tabs #tabRef [attr.dir]="this.translateService.direction()">

    <ion-tab-bar slot="top" *ngIf="!platform.is('mobile')" [attr.dir]="this.translateService.direction()">

      <ion-tab-button tab="dashboard" layout="icon-start">
        <ion-icon src="assets/icons/home.svg"></ion-icon>
        <ion-label>{{ 'Home' | translate }}</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="invitations" layout="icon-start">
        <ion-icon src="assets/icons/invitation-tab.svg"></ion-icon>
        <ion-label>{{ 'Invitation' | translate }}</ion-label>
        <ion-badge *ngIf="authService.invitationCount > 0">{{ authService.invitationCount }}</ion-badge>
      </ion-tab-button>

      <ion-tab-button tab="payments" layout="icon-start">
        <ion-icon src="assets/icons/payment-tab.svg"></ion-icon>
        <ion-label>{{ 'Payments' | translate }}</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="profile" layout="icon-start">
        <ion-icon src="assets/icons/profile-tab.svg"></ion-icon>
        <ion-label>{{ 'Profile' | translate }}</ion-label>
      </ion-tab-button>
    </ion-tab-bar>

    <ion-tab-bar slot="bottom" class="mobile" *ngIf="platform.is('mobile')"
      [attr.dir]="this.translateService.direction()">

      <ion-tab-button tab="dashboard">
        <ion-icon class="not-current" src="assets/icons/home.svg"></ion-icon>
        <ion-icon class="icon-selected" src="assets/icons/home-selected.svg"></ion-icon>
        <ion-label>{{ 'Home' | translate }}</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="invitations">
        <ion-icon class="not-current" src="assets/icons/invitation-tab.svg"></ion-icon>
        <ion-icon class="icon-selected" src="assets/icons/invitation-selected.svg"></ion-icon>
        <ion-label>{{ 'Invitation' | translate }}</ion-label>
        <ion-badge *ngIf="authService.invitationCount > 0">{{ authService.invitationCount }}</ion-badge>
      </ion-tab-button>

      <ion-tab-button tab="payments">
        <ion-icon class="not-current" src="assets/icons/payment-tab.svg"></ion-icon>
        <ion-icon class="icon-selected" src="assets/icons/payment-selected.svg"></ion-icon>
        <ion-label>{{ 'Payments' | translate }}</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="profile">
        <ion-icon src="assets/icons/profile-tab.svg"></ion-icon>
        <ion-label>{{ 'Profile' | translate }}</ion-label>
      </ion-tab-button>

    </ion-tab-bar>
  </ion-tabs>
</ion-content>
