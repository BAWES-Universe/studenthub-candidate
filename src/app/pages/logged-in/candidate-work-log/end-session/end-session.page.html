 
<ion-content>
  <h5>End Session?</h5>
  
  <button class="btn-close" (click)="close()">
    <ion-ripple-effect></ion-ripple-effect>
    <ion-icon name="close-outline"></ion-icon>
  </button>

  <p>Do you want to end and submit this session? you can start more sessions later.</p>

  <div class="btn-wrapper">
    <ion-button class="btn-end"  fill="outline" color="danger">
      End & Discard
    </ion-button>
  
    <ion-button class="btn-submit">
      Stop & Submit
    </ion-button>
  </div>

</ion-content>
