<ion-header class="clear-header" *ngIf="platform.is('mobile')">
  <ion-toolbar>
    <ion-title class="ion-text-start">{{ "Invitations" | translate }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [scrollEvents]="true" (ionScroll)="logScrolling($event)" [attr.dir]="translateService.direction()">

  <ion-progress-bar *ngIf="loading" type="indeterminate"></ion-progress-bar>

  <div class="max-width">

    <app-invitation [model]="invitation" *ngFor="let invitation of invitations" (onUpdate)="loadInvitations()">
    </app-invitation>
    
    <p *ngIf="invitations.length ==0 && !loading"> {{"~ No invitation found ~"}}</p>

    <ion-infinite-scroll *ngIf="currentPage < pageCount" (ionInfinite)="doInfinite($event)">
      <ion-infinite-scroll-content>
      </ion-infinite-scroll-content>
    </ion-infinite-scroll>
    
  </div>

</ion-content>
<ion-footer>
  <app-working-counter></app-working-counter>
</ion-footer>
